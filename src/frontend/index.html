<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ClinicalRAG</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sb">
    <div class="sb-logo">
      <div class="sb-logo-name">ClinicalRAG</div>
      <div class="sb-logo-tag">Document Intelligence</div>
    </div>
    <div class="sb-lbl">Documents</div>
    <div class="doc-list" id="doc-list">
      <div class="doc-empty">Loading...</div>
    </div>
    <div class="sb-bottom">
      <button class="upload-btn" id="upload-btn">Upload PDF</button>
      <div class="upload-msg" id="upload-msg"></div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <header class="hdr">
      <div class="hdr-l">
        <span class="live"><span class="dot"></span>Llama 3.3 70B via Groq</span>
        <span class="hdr-stat" id="hdr-stat"><b>0</b> chunks indexed</span>
      </div>
      <div class="hdr-r">
        <button class="icon-btn" id="theme-btn" title="Toggle theme">☾</button>
      </div>
    </header>

    <div class="chat" id="chat">
      <div class="welcome" id="welcome">
        <h2>Clinical Document Intelligence</h2>
        <div class="wline"></div>
        <p>Upload clinical PDF reports and ask questions. Every answer is grounded in your documents with source citations.</p>
        <div class="eg-list">
          <button class="eg">What was the WBC count in the lymphoma patient?</button>
          <button class="eg">What medications was the stroke patient discharged with?</button>
          <button class="eg">What is the HbA1c of the diabetic patient?</button>
          <button class="eg">Which patient was admitted to the ICU and why?</button>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-row">
        <div class="input-wrap">
          <textarea id="qi" rows="1" placeholder="Ask a clinical question about your documents..."></textarea>
        </div>
        <button class="send-btn" id="send-btn">Ask</button>
      </div>
      <div class="input-foot">
        <span class="hint">Enter to send · Shift+Enter for newline</span>
        <span class="hint" id="foot-stat"></span>
      </div>
    </div>
  </main>
</div>

<!-- Modal -->
<div class="modal-ov" id="modal">
  <div class="modal">
    <div class="modal-hdr">
      <div>
        <div class="modal-sec" id="m-sec"></div>
        <div class="modal-src" id="m-src"></div>
      </div>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-body" id="m-body"></div>
  </div>
</div>

<input type="file" id="file-in" accept=".pdf" style="display:none">

<script type="module" src="/static/js/app.js"></script>
</body>
</html>
